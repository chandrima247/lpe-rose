<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>La Patisserie Express ”” Order</title>
  <style>
/* ============================================================
   La Patisserie ”” Colors & Type
   Premium café + food e-commerce. Warm luxury, editorial.
   ============================================================ */

@import url("https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Manrope:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap");

:root {
  /* ---------- BRAND ---------- */
  /* Primary deep wine red ”” sourced from the logo (#9E0B0F).
     The user's spec called for #8B0000; we kept the actual brand
     red as `--brand` and expose --brand-classic for spec parity. */
  --brand: #C4546A;
  --brand-classic: #A33858;

  /* Wine / red scale */
  --red-50:  #FCF1F1;
  --red-100: #F8DEDE;
  --red-200: #F1B7B7;
  --red-300: #E58787;
  --red-400: #D24E4E;
  --red-500: #B82026;
  --red-600: #9E0B0F;   /* brand */
  --red-700: #82080C;
  --red-800: #5F0608;
  --red-900: #3D0405;

  /* Cream / warm neutral scale (the "soft cream" surface) */
  --cream-50:  #FFFBF7;
  --cream-100: #FFF0F3;   /* spec: secondary cream */
  --cream-200: #FAE6EC;
  --cream-300: #F2E4D3;
  --cream-400: #E6D2B8;
  --cream-500: #D4B896;
  --cream-600: #B89472;

  /* Charcoal / ink scale */
  --ink-50:  #F7F7F7;
  --ink-100: #EDEDED;
  --ink-200: #D9D9D9;
  --ink-300: #B3B3B3;
  --ink-400: #8A8A8A;
  --ink-500: #5C5C5C;
  --ink-600: #3D3D3D;
  --ink-700: #2B2B2B;
  --ink-800: #191919;     /* spec: text */
  --ink-900: #0E0E0E;

  /* Subtle gold ”” accents, dividers, premium markers */
  --gold-50:  #FBF6EC;
  --gold-100: #F2E6C7;
  --gold-200: #E6D097;
  --gold-300: #D4B05E;
  --gold-400: #B6913E;   /* primary gold */
  --gold-500: #8C6E2B;
  --gold-600: #5E4A1C;

  /* Semantic ”” muted, never neon */
  --success-50:  #ECF3EE;
  --success-500: #4F8C6B;
  --success-700: #356048;
  --warning-500: #C7872A;
  --error-500:   #B82026;
  --info-500:    #4A6B8A;

  /* ---------- SEMANTIC SURFACES ---------- */
  --bg:            #FFFFFF;
  --bg-cream:      var(--cream-100);
  --bg-warm:       var(--cream-50);
  --bg-inverse:    var(--ink-800);
  --bg-brand:      var(--brand);

  --surface:       #FFFFFF;
  --surface-raised:#FFFFFF;
  --surface-sunken:var(--cream-50);
  --surface-muted: var(--ink-50);

  --border:        #ECE6DE;       /* warm hairline */
  --border-strong: var(--ink-200);
  --border-brand:  var(--brand);
  --divider-gold:  var(--gold-300);

  /* Text */
  --fg:            var(--ink-800);
  --fg-muted:      var(--ink-500);
  --fg-subtle:     var(--ink-400);
  --fg-inverse:    #FFFFFF;
  --fg-brand:      var(--brand);
  --fg-gold:       var(--gold-500);
  --fg-link:       var(--brand);

  /* Interactive states */
  --hover-overlay: rgba(25, 25, 25, 0.04);
  --press-overlay: rgba(25, 25, 25, 0.08);
  --focus-ring:    rgba(158, 11, 15, 0.35);
  --selection-bg:  var(--cream-200);

  /* ---------- TYPOGRAPHY ---------- */
  /* Display / heading: editorial serif. Cormorant Garamond is
     used as a Google Fonts substitute for the brand's premium
     serif feel (closest free match to GTStandard-M / Times). */
  --font-serif:   "Cormorant Garamond", "Times New Roman", Georgia, serif;
  /* Body / UI: clean, modern grotesque. Manrope reads well on
     long cards and dense menus; Poppins is kept for legacy
     parity with the existing patexpressug.com tokens. */
  --font-sans:    "Manrope", "Poppins", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  --font-display: var(--font-serif);
  --font-mono:    "SF Mono", "JetBrains Mono", ui-monospace, monospace;

  /* Type scale ”” modular ~1.25, optimized for editorial pages */
  --fs-12: 0.75rem;     /* 12 ”” micro / caption */
  --fs-13: 0.8125rem;   /* 13 ”” small */
  --fs-14: 0.875rem;    /* 14 ”” meta / labels */
  --fs-16: 1rem;        /* 16 ”” body */
  --fs-18: 1.125rem;    /* 18 ”” body-lg */
  --fs-20: 1.25rem;     /* 20 ”” h6 / lead */
  --fs-24: 1.5rem;      /* 24 ”” h5 */
  --fs-30: 1.875rem;    /* 30 ”” h4 */
  --fs-36: 2.25rem;     /* 36 ”” h3 */
  --fs-48: 3rem;        /* 48 ”” h2 */
  --fs-64: 4rem;        /* 64 ”” h1 / display */
  --fs-80: 5rem;        /* 80 ”” hero display */

  --lh-tight:  1.05;
  --lh-snug:   1.2;
  --lh-normal: 1.5;
  --lh-relaxed:1.7;

  --ls-tight:  -0.02em;
  --ls-normal: 0;
  --ls-wide:   0.04em;
  --ls-wider:  0.14em;   /* eyebrows, gold all-caps */

  /* ---------- SPACING (4px grid) ---------- */
  --sp-0:   0;
  --sp-1:   4px;     /* xs */
  --sp-2:   8px;     /* sm */
  --sp-3:   12px;
  --sp-4:   16px;    /* md */
  --sp-5:   20px;
  --sp-6:   24px;    /* lg */
  --sp-8:   32px;    /* xl */
  --sp-10:  40px;
  --sp-12:  48px;    /* 2xl */
  --sp-16:  64px;    /* 3xl */
  --sp-20:  80px;
  --sp-24:  96px;
  --sp-32:  128px;

  /* ---------- RADII ---------- */
  --r-xs:   4px;
  --r-sm:   8px;     /* spec: small */
  --r-md:   12px;    /* spec: medium */
  --r-lg:   18px;    /* spec: large (cards) */
  --r-xl:   24px;    /* spec: large (modals) */
  --r-2xl:  32px;
  --r-pill: 999px;
  --r-full: 50%;

  /* ---------- ELEVATION (soft, diffused) ---------- */
  --shadow-xs:  0 1px 2px rgba(25, 25, 25, 0.04);
  --shadow-sm:  0 2px 6px rgba(25, 25, 25, 0.05), 0 1px 2px rgba(25, 25, 25, 0.04);
  --shadow-md:  0 8px 24px rgba(25, 25, 25, 0.06), 0 2px 6px rgba(25, 25, 25, 0.04);
  --shadow-lg:  0 18px 40px rgba(25, 25, 25, 0.08), 0 6px 14px rgba(25, 25, 25, 0.05);
  --shadow-xl:  0 32px 64px rgba(25, 25, 25, 0.12), 0 12px 24px rgba(25, 25, 25, 0.06);
  --shadow-brand: 0 12px 28px rgba(158, 11, 15, 0.20);
  --shadow-inset: inset 0 0 0 1px var(--border);

  /* ---------- MOTION ---------- */
  --dur-instant: 80ms;
  --dur-fast:    160ms;
  --dur-base:    220ms;
  --dur-slow:    320ms;
  --dur-slower:  480ms;

  --ease-standard: cubic-bezier(0.2, 0.0, 0.0, 1);   /* premium swoop */
  --ease-emphasis: cubic-bezier(0.2, 0.8, 0.2, 1);
  --ease-out:      cubic-bezier(0.16, 1, 0.3, 1);
  --ease-in:       cubic-bezier(0.7, 0, 0.84, 0);

  /* ---------- LAYOUT ---------- */
  --container-sm:  640px;
  --container-md:  768px;
  --container-lg:  1024px;
  --container-xl:  1280px;
  --container-2xl: 1440px;
  --container-max: 1440px;

  --gutter-mobile:  20px;
  --gutter-tablet:  32px;
  --gutter-desktop: 48px;

  /* z-index scale */
  --z-base: 0;
  --z-raised: 10;
  --z-dropdown: 1000;
  --z-sticky: 1100;
  --z-modal: 1200;
  --z-toast: 1300;
}

/* ---------- SEMANTIC TYPE STYLES ---------- */
.h-display {
  font-family: var(--font-display);
  font-weight: 500;
  font-size: clamp(var(--fs-48), 6vw, var(--fs-80));
  line-height: var(--lh-tight);
  letter-spacing: var(--ls-tight);
  color: var(--fg);
}

.h1 {
  font-family: var(--font-display);
  font-weight: 500;
  font-size: clamp(var(--fs-36), 4.5vw, var(--fs-64));
  line-height: 1.08;
  letter-spacing: var(--ls-tight);
  color: var(--fg);
}

.h2 {
  font-family: var(--font-display);
  font-weight: 500;
  font-size: var(--fs-48);
  line-height: 1.12;
  letter-spacing: -0.015em;
  color: var(--fg);
}

.h3 {
  font-family: var(--font-display);
  font-weight: 500;
  font-size: var(--fs-36);
  line-height: 1.18;
  letter-spacing: -0.01em;
  color: var(--fg);
}

.h4 {
  font-family: var(--font-display);
  font-weight: 500;
  font-size: var(--fs-30);
  line-height: 1.22;
  color: var(--fg);
}

.h5 {
  font-family: var(--font-sans);
  font-weight: 600;
  font-size: var(--fs-20);
  line-height: 1.3;
  letter-spacing: -0.005em;
  color: var(--fg);
}

.h6 {
  font-family: var(--font-sans);
  font-weight: 600;
  font-size: var(--fs-18);
  line-height: 1.4;
  color: var(--fg);
}

.eyebrow {
  font-family: var(--font-sans);
  font-weight: 600;
  font-size: var(--fs-12);
  line-height: 1;
  letter-spacing: var(--ls-wider);
  text-transform: uppercase;
  color: var(--fg-gold);
}

.lead {
  font-family: var(--font-sans);
  font-weight: 400;
  font-size: var(--fs-20);
  line-height: var(--lh-relaxed);
  color: var(--fg-muted);
}

.p, .body {
  font-family: var(--font-sans);
  font-weight: 400;
  font-size: var(--fs-16);
  line-height: var(--lh-normal);
  color: var(--fg);
}

.body-sm {
  font-family: var(--font-sans);
  font-weight: 400;
  font-size: var(--fs-14);
  line-height: var(--lh-normal);
  color: var(--fg);
}

.caption {
  font-family: var(--font-sans);
  font-weight: 400;
  font-size: var(--fs-12);
  line-height: 1.4;
  color: var(--fg-muted);
}

.label {
  font-family: var(--font-sans);
  font-weight: 500;
  font-size: var(--fs-13);
  letter-spacing: var(--ls-wide);
  text-transform: uppercase;
  color: var(--fg-muted);
}

.price {
  font-family: var(--font-sans);
  font-weight: 600;
  font-size: var(--fs-18);
  letter-spacing: -0.01em;
  color: var(--fg);
  font-variant-numeric: tabular-nums;
}

/* ---------- BASE RESETS ---------- */
*, *::before, *::after { box-sizing: border-box; }
html { -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
body {
  margin: 0;
  background: var(--bg);
  color: var(--fg);
  font-family: var(--font-sans);
  font-size: var(--fs-16);
  line-height: var(--lh-normal);
}
::selection { background: var(--cream-200); color: var(--fg); }

/* â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ Tweakable runtime tokens â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
:root {
  --brand-live: var(--brand);
  --gold-live: var(--gold-400);
  --gold-line: rgba(182, 145, 62, 1);
  --display-family: var(--font-serif);
  --card-pad-y: var(--sp-5);
  --card-pad-x: var(--sp-5);
  --hero-mode: 0;     /* 0 = full-bleed photo, 1 = cream editorial */
  --gold-opacity: 1;

  --nav-h: 72px;
  --footer-pad: 64px;
}

/* hide the gold accent everywhere */
[data-gold="off"] {
  --gold-opacity: 0;
}
[data-gold="off"] .eyebrow,
[data-gold="off"] .gold-rule,
[data-gold="off"] .badge-gold,
[data-gold="off"] .signature-marker { opacity: 0 !important; }

/* density */
[data-density="compact"] {
  --card-pad-y: var(--sp-4);
  --card-pad-x: var(--sp-4);
}
[data-density="editorial"] {
  --card-pad-y: var(--sp-6);
  --card-pad-x: var(--sp-6);
}

/* display family swap */
[data-display="sans"] {
  --display-family: var(--font-sans);
}

/* â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ BASE â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
html, body { height: 100%; }
body {
  background: var(--bg-cream);
  color: var(--fg);
  font-family: var(--font-sans);
  -webkit-font-smoothing: antialiased;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
button { font: inherit; cursor: pointer; background: none; border: 0; color: inherit; }
img { max-width: 100%; display: block; }
input, select, textarea { font: inherit; color: inherit; }
a { color: inherit; text-decoration: none; }

/* serif headers */
.serif { font-family: var(--display-family); font-weight: 500; letter-spacing: -0.01em; }

/* gold rule divider */
.gold-rule {
  height: 1px;
  background: var(--gold-line);
  opacity: var(--gold-opacity);
  border: 0;
  margin: var(--sp-2) 0;
}

/* eyebrow */
.eyebrow {
  font-family: var(--font-sans);
  font-weight: 600;
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--gold-500);
  opacity: var(--gold-opacity);
}

/* containers */
.container {
  width: 100%;
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 var(--gutter-mobile);
}
@media (min-width: 768px) { .container { padding: 0 var(--gutter-tablet); } }
@media (min-width: 1024px) { .container { padding: 0 var(--gutter-desktop); } }

/* â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ NAV â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
.nav {
  position: sticky;
  top: 0;
  z-index: var(--z-sticky);
  height: var(--nav-h);
  background: rgba(255, 251, 247, 0.92);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--border);
}
.nav-inner {
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--sp-4);
}
.nav-brand {
  display: flex;
  align-items: center;
  gap: var(--sp-3);
}
.nav-brand img { height: 114px; width: 114px; object-fit: contain; }
.nav-tagline {
  display: none;
  font-family: var(--font-serif);
  font-weight: 500;
  font-size: 15px;
  line-height: 1.3;
  color: var(--ink-700);
  text-align: left;
}
@media (min-width: 480px) { .nav-tagline { display: block; } }
.nav-brand .wm {
  display: none;
  font-family: var(--display-family);
  font-weight: 500;
  font-size: 18px;
  line-height: 1;
  color: var(--brand-live);
}
.nav-brand .wm small { display: block; font-size: 9px; letter-spacing: 0.22em; color: var(--gold-500); margin-top: 4px; opacity: var(--gold-opacity); }
@media (min-width: 600px) { .nav-brand .wm { display: block; } }
.nav-links {
  display: none;
  align-items: center;
  gap: var(--sp-6);
  font-size: 14px;
  font-weight: 500;
  color: var(--fg);
}
@media (min-width: 900px) { .nav-links { display: flex; } }
.nav-links button { transition: color var(--dur-fast); padding: 4px 0; position: relative; }
.nav-links button:hover { color: var(--brand-live); }
.nav-links button.active { color: var(--brand-live); }
.nav-links button.active::after {
  content: ""; position: absolute; left: 0; right: 0; bottom: -6px; height: 1px;
  background: var(--gold-live); opacity: var(--gold-opacity);
}
.nav-actions { display: flex; align-items: center; gap: var(--sp-2); }
.nav-icon-btn {
  position: relative;
  width: 44px; height: 44px;
  display: grid; place-items: center;
  border-radius: var(--r-pill);
  color: var(--ink-700);
  transition: background var(--dur-fast), color var(--dur-fast);
}
.nav-icon-btn:hover { background: var(--cream-100); color: var(--brand-live); }
.nav-icon-btn[data-active="true"] { color: var(--brand-live); }
.cart-badge {
  position: absolute; top: 4px; right: 4px;
  min-width: 18px; height: 18px; padding: 0 5px;
  display: grid; place-items: center;
  background: var(--brand-live); color: #fff;
  font-size: 10px; font-weight: 700;
  border-radius: var(--r-pill);
  border: 2px solid var(--cream-50);
}

/* â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ PAGE / FADE â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
.page { animation: fade .26s var(--ease-emphasis) both; }
@keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

/* â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ BUTTONS â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
.btn {
  min-height: 48px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: var(--sp-2);
  border-radius: var(--r-sm);
  padding: 0 var(--sp-6);
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.01em;
  background: var(--brand-live);
  color: #fff;
  transition: transform var(--dur-fast), background var(--dur-fast), box-shadow var(--dur-fast);
}
.btn:hover { background: var(--red-700); }
.btn:active { transform: scale(0.98); }
.btn.full { width: 100%; }
.btn.lg { min-height: 56px; font-size: 15px; padding: 0 var(--sp-8); }
.btn.secondary {
  background: transparent;
  color: var(--fg);
  border: 1px solid var(--ink-200);
}
.btn.secondary:hover { border-color: var(--ink-700); background: transparent; color: var(--fg); }
.btn.ghost {
  background: transparent;
  color: var(--brand-live);
  padding: 0 var(--sp-3);
}
.btn.ghost:hover { background: transparent; color: var(--red-700); }
.btn.dark {
  background: var(--ink-800);
  color: #fff;
}
.btn.dark:hover { background: var(--ink-900); }
.btn.gold {
  background: var(--gold-400);
  color: #fff;
}
.btn.gold:hover { background: var(--gold-500); }

/* link */
.link {
  color: var(--brand-live);
  font-weight: 500;
  text-decoration: none;
  border-bottom: 1px solid currentColor;
  padding-bottom: 1px;
  transition: opacity var(--dur-fast);
}
.link:hover { opacity: 0.7; }

/* â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ INPUTS â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
.field { margin-bottom: var(--sp-4); }
.field label.lbl {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--ink-500);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  margin-bottom: var(--sp-2);
}
.field .hint {
  margin-top: var(--sp-1);
  color: var(--fg-muted);
  font-size: 12px;
  line-height: 1.4;
}
.input {
  width: 100%;
  min-height: 52px;
  padding: 0 var(--sp-4);
  background: #fff;
  border: 1px solid var(--ink-200);
  border-radius: var(--r-sm);
  color: var(--fg);
  font-size: 15px;
  transition: border-color var(--dur-fast), box-shadow var(--dur-fast);
}
.input:focus {
  outline: 0;
  border-color: var(--brand-live);
  box-shadow: 0 0 0 3px var(--focus-ring);
}
.input.invalid { border-color: var(--error-500); background: #FFF5F5; }
.input::placeholder { color: var(--ink-400); }

.phone-wrap {
  display: flex;
  align-items: center;
  border: 1px solid var(--ink-200);
  border-radius: var(--r-sm);
  background: #fff;
  overflow: hidden;
}
.phone-wrap:focus-within { border-color: var(--brand-live); box-shadow: 0 0 0 3px var(--focus-ring); }
.phone-prefix {
  display: flex; align-items: center; gap: 6px;
  padding: 0 var(--sp-4); height: 50px;
  border-right: 1px solid var(--ink-100);
  font-size: 14px; font-weight: 500; color: var(--fg-muted);
  background: var(--cream-50);
  flex-shrink: 0;
}
.phone-wrap .input { border: 0; box-shadow: none; }

/* â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ CARDS / SURFACES â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
.card {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: var(--card-pad-y) var(--card-pad-x);
}
.card.shadow { border: 0; box-shadow: var(--shadow-sm); }
.card.flat { border: 0; }

.surface-cream { background: var(--bg-cream); }
.surface-white { background: #fff; }

/* â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ TOAST â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
.toast {
  position: fixed;
  top: calc(var(--nav-h) + 16px);
  left: 50%; transform: translateX(-50%);
  background: var(--ink-800); color: #fff;
  padding: 12px 20px;
  border-radius: var(--r-pill);
  box-shadow: var(--shadow-lg);
  z-index: var(--z-toast);
  font-size: 14px; font-weight: 500;
  opacity: 0; pointer-events: none;
  transition: opacity var(--dur-base), transform var(--dur-base);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ BADGES â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
.badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 10px;
  border-radius: var(--r-pill);
  background: var(--cream-100);
  font-size: 11px; font-weight: 600;
  color: var(--ink-600);
  letter-spacing: 0.02em;
}
.badge.brand { background: rgba(158,11,15,0.08); color: var(--brand-live); }
.badge.gold {
  background: transparent;
  border: 1px solid var(--gold-300);
  color: var(--gold-500);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  font-size: 10px;
  opacity: var(--gold-opacity);
}
.badge.dark { background: var(--ink-800); color: #fff; }
.badge.success { background: var(--success-50); color: var(--success-700); }

/* â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ HERO â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
.hero {
  position: relative;
  overflow: hidden;
  min-height: 560px;
}
.hero-photo {
  position: absolute; inset: 0;
}
.hero-photo img {
  width: 100%; height: 100%; object-fit: cover;
}
.hero-photo::after {
  content: "";
  position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(14,4,4,0.05) 0%, rgba(14,4,4,0.25) 40%, rgba(14,4,4,0.85) 100%);
}
.hero-inner {
  position: relative;
  z-index: 2;
  min-height: 560px;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 80px 0 64px;
  color: #fff;
}
.hero-eyebrow {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: var(--font-sans);
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--gold-200);
  opacity: var(--gold-opacity);
  margin-bottom: var(--sp-4);
}
.hero-eyebrow::before, .hero-eyebrow::after {
  content: ""; width: 24px; height: 1px; background: var(--gold-300); opacity: var(--gold-opacity);
}
.hero h1 {
  font-family: var(--display-family);
  font-weight: 500;
  font-size: clamp(48px, 7vw, 92px);
  line-height: 1.02;
  letter-spacing: -0.02em;
  margin-bottom: var(--sp-5);
  color: #fff;
  text-wrap: balance;
}
.hero h1 em {
  font-style: italic;
  color: var(--cream-200);
  font-weight: 400;
}
.hero p.lead-h {
  font-size: clamp(16px, 1.6vw, 18px);
  line-height: 1.6;
  max-width: 520px;
  color: rgba(255,255,255,0.8);
  margin-bottom: var(--sp-6);
}
.hero-ctas { display: flex; flex-wrap: wrap; gap: var(--sp-3); }
.hero .btn.secondary { color: #fff; border-color: rgba(255,255,255,0.4); background: transparent; }
.hero .btn.secondary:hover { background: rgba(255,255,255,0.08); border-color: #fff; }

/* hero variant: editorial cream */
.hero.editorial { background: var(--cream-100); min-height: auto; }
.hero.editorial .hero-photo { display: none; }
.hero.editorial .hero-inner { color: var(--fg); padding: 100px 0; min-height: auto; }
.hero.editorial h1 { color: var(--ink-800); }
.hero.editorial h1 em { color: var(--brand-live); }
.hero.editorial .hero-eyebrow { color: var(--gold-500); }
.hero.editorial .hero-eyebrow::before, .hero.editorial .hero-eyebrow::after { background: var(--gold-300); }
.hero.editorial p.lead-h { color: var(--ink-500); }
.hero.editorial .btn.secondary { color: var(--fg); border-color: var(--ink-200); }

.hero.editorial .editorial-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: var(--sp-12);
  align-items: center;
}
@media (min-width: 900px) {
  .hero.editorial .editorial-grid {
    grid-template-columns: 1.2fr 1fr;
  }
}
.hero.editorial .ed-stack {
  position: relative;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--sp-3);
}
.hero.editorial .ed-stack img {
  border-radius: var(--r-md);
  width: 100%;
  aspect-ratio: 3/4;
  object-fit: cover;
}
.hero.editorial .ed-stack img:first-child {
  grid-row: span 2;
  aspect-ratio: 3/5;
}

/* hero variant: split */
.hero.split { background: var(--ink-800); min-height: auto; padding: 0; }
.hero.split .hero-photo { display: none; }
.hero.split .hero-split-grid {
  display: grid;
  grid-template-columns: 1fr;
  min-height: 600px;
}
@media (min-width: 900px) {
  .hero.split .hero-split-grid { grid-template-columns: 1fr 1fr; }
}
.hero.split .hero-side-text {
  padding: 80px var(--gutter-tablet);
  display: flex;
  flex-direction: column;
  justify-content: center;
  background: var(--ink-800);
  color: #fff;
}
.hero.split .hero-side-img {
  position: relative; min-height: 380px;
  background-size: cover; background-position: center;
}
.hero.split .hero-side-img::after {
  content: "";
  position: absolute; inset: 0;
  background: linear-gradient(90deg, var(--ink-800) 0%, transparent 24%);
  display: none;
}
@media (min-width: 900px) { .hero.split .hero-side-img::after { display: block; } }

/* â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ TRUST BAR â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
.trust-bar {
  background: var(--ink-800);
  color: rgba(255,255,255,0.86);
  padding: var(--sp-3) 0;
  border-top: 1px solid rgba(182,145,62,0.4);
  border-bottom: 1px solid rgba(182,145,62,0.4);
}
.trust-bar-inner {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: var(--sp-2);
  font-size: 12px;
  font-weight: 500;
  text-align: center;
}
@media (min-width: 700px) { .trust-bar-inner { grid-template-columns: repeat(4, 1fr); } }
.trust-item {
  padding: var(--sp-2) var(--sp-2);
}
.trust-item strong { color: #fff; font-weight: 700; letter-spacing: 0.02em; }
.trust-item .gold-tick { color: var(--gold-300); margin-right: 6px; opacity: var(--gold-opacity); }

/* â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ SECTION â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
.section { padding: var(--sp-16) 0; }
.section.tight { padding: var(--sp-12) 0; }
.section.cream { background: var(--cream-100); }
.section.warm { background: var(--cream-50); }
.section.dark { background: var(--ink-800); color: #fff; }
.section-head {
  display: flex; flex-direction: column; gap: var(--sp-2);
  margin-bottom: var(--sp-8);
  text-align: center;
  align-items: center;
}
.section-head h2 {
  font-family: var(--display-family);
  font-weight: 500;
  font-size: clamp(32px, 4vw, 48px);
  line-height: 1.08;
  color: var(--fg);
  letter-spacing: -0.015em;
}
.section.dark .section-head h2 { color: #fff; }
.section-head p { color: var(--fg-muted); max-width: 520px; }
.section.dark .section-head p { color: rgba(255,255,255,0.7); }

/* â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ FAVOURITES STRIP â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
.fav-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: var(--sp-5);
}
@media (min-width: 600px) { .fav-grid { grid-template-columns: repeat(3, 1fr); } }
@media (min-width: 1024px) { .fav-grid { grid-template-columns: repeat(6, 1fr); } }
.fav-item { text-align: center; cursor: pointer; transition: transform var(--dur-base) var(--ease-out); }
.fav-item:hover { transform: translateY(-4px); }
.fav-art {
  aspect-ratio: 1;
  background: #F7F4F0;
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  overflow: hidden;
  overflow: hidden;
  display: grid; place-items: center;
  margin-bottom: var(--sp-3);
  transition: box-shadow var(--dur-base);
}
.fav-art img { width: 100%; height: 100%; object-fit: cover; }
.fav-item:hover .fav-art { box-shadow: var(--shadow-md); }
.fav-item h4 {
  font-family: var(--font-sans);
  font-size: 13px;
  font-weight: 600;
  color: var(--fg);
}
.fav-item .price-mini { font-size: 12px; color: var(--fg-muted); margin-top: 2px; }

/* â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ LOYALTY VARIANTS â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
.loyalty-section { padding: var(--sp-16) 0; }
.loyalty-card {
  border-radius: var(--r-xl);
  overflow: hidden;
  border: 1px solid var(--border);
  background: #fff;
}

/* light */
.loyalty-card.light {
  background: var(--cream-50);
  border-color: var(--gold-200);
}
.loyalty-card.light .loy-head { padding: var(--sp-12) var(--sp-10); border-bottom: 1px solid var(--border); }
.loyalty-card.light .loy-head h3 { color: var(--ink-800); font-family: var(--display-family); font-size: clamp(32px, 4vw, 48px); font-weight: 500; line-height: 1.05; letter-spacing: -0.015em; }
.loyalty-card.light .loy-head p { color: var(--fg-muted); margin-top: var(--sp-3); max-width: 520px; }

/* dark */
.loyalty-card.dark {
  background: var(--ink-800);
  border-color: transparent;
  color: #fff;
}
.loyalty-card.dark .loy-head { padding: var(--sp-12) var(--sp-10); border-bottom: 1px solid rgba(255,255,255,0.08); }
.loyalty-card.dark .loy-head h3 { color: #fff; font-family: var(--display-family); font-size: clamp(32px, 4vw, 48px); font-weight: 500; line-height: 1.05; letter-spacing: -0.015em; }
.loyalty-card.dark .loy-head h3 em { color: var(--gold-300); font-style: italic; opacity: var(--gold-opacity); }
.loyalty-card.dark .loy-head p { color: rgba(255,255,255,0.7); margin-top: var(--sp-3); max-width: 520px; }
.loyalty-card.dark .loy-step strong { color: #fff; }
.loyalty-card.dark .loy-step span { color: rgba(255,255,255,0.6); }
.loyalty-card.dark .loy-redeem { background: transparent; border-color: var(--gold-400); color: #fff; }
.loyalty-card.dark .loy-redeem strong { color: var(--gold-300); opacity: var(--gold-opacity); }
.loyalty-card.dark .loy-benefit-row { color: rgba(255,255,255,0.86); border-color: rgba(255,255,255,0.08); }
.loyalty-card.dark .loy-benefit-row svg { color: var(--gold-300); opacity: var(--gold-opacity); }

/* gold */
.loyalty-card.gold {
  background:
    radial-gradient(80% 60% at 0% 0%, rgba(255,255,255,0.12), transparent 50%),
    linear-gradient(135deg, var(--brand-live) 0%, var(--red-700) 60%, var(--ink-800) 100%);
  border: 1px solid var(--gold-400);
  color: #fff;
}
.loyalty-card.gold .loy-head { padding: var(--sp-12) var(--sp-10); }
.loyalty-card.gold .loy-head h3 { color: #fff; font-family: var(--display-family); font-size: clamp(32px, 4vw, 48px); font-weight: 500; line-height: 1.05; letter-spacing: -0.015em; }
.loyalty-card.gold .loy-head h3 em { color: var(--gold-200); font-style: italic; opacity: var(--gold-opacity); }
.loyalty-card.gold .loy-head p { color: rgba(255,255,255,0.86); margin-top: var(--sp-3); max-width: 520px; }
.loyalty-card.gold .loy-body { background: rgba(0,0,0,0.18); border-top: 1px solid rgba(182,145,62,0.4); }
.loyalty-card.gold .loy-step strong { color: #fff; }
.loyalty-card.gold .loy-step span { color: rgba(255,255,255,0.7); }
.loyalty-card.gold .loy-redeem { background: rgba(255,255,255,0.08); border-color: var(--gold-300); color: #fff; }
.loyalty-card.gold .loy-redeem strong { color: var(--gold-200); opacity: var(--gold-opacity); }
.loyalty-card.gold .loy-benefit-row { color: rgba(255,255,255,0.92); border-color: rgba(255,255,255,0.1); }
.loyalty-card.gold .loy-benefit-row svg { color: var(--gold-200); opacity: var(--gold-opacity); }

/* shared loyalty body */
.loy-body {
  display: grid;
  grid-template-columns: 1fr;
  padding: var(--sp-10);
  gap: var(--sp-8);
}
@media (min-width: 900px) { .loy-body { grid-template-columns: 1.1fr 0.9fr; } }
.loy-benefits { list-style: none; padding: 0; margin: 0; display: grid; gap: 0; }
.loy-benefit-row {
  display: grid;
  grid-template-columns: 32px 1fr;
  gap: var(--sp-3);
  padding: var(--sp-4) 0;
  border-top: 1px solid var(--border);
  font-size: 15px;
  align-items: center;
}
.loy-benefit-row:first-child { border-top: 0; }
.loy-benefit-row svg { color: var(--gold-500); opacity: var(--gold-opacity); }
.loy-benefit-row b { font-weight: 600; }
.loy-step-row {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: var(--sp-4);
  padding: var(--sp-6);
  border-radius: var(--r-md);
  background: rgba(255,255,255,0.6);
}
.loyalty-card.dark .loy-step-row,
.loyalty-card.gold .loy-step-row { background: rgba(255,255,255,0.05); }
.loy-step { text-align: center; }
.loy-step strong { display: block; font-family: var(--display-family); font-weight: 500; font-size: clamp(24px, 3vw, 32px); color: var(--ink-800); line-height: 1; }
.loy-step span { display: block; margin-top: 6px; font-size: 12px; color: var(--fg-muted); letter-spacing: 0.04em; text-transform: uppercase; }
.loy-arrow { color: var(--gold-500); font-size: 24px; opacity: var(--gold-opacity); }
.loy-redeem {
  margin-top: var(--sp-4);
  padding: var(--sp-5);
  border-radius: var(--r-md);
  border: 1px solid var(--gold-300);
  text-align: center;
}
.loy-redeem strong { display: block; font-family: var(--display-family); font-weight: 500; font-size: clamp(28px, 4vw, 40px); color: var(--brand-live); line-height: 1.02; }
.loy-redeem span { display: block; margin-top: 6px; font-size: 13px; color: var(--fg-muted); }
.loy-actions { margin-top: var(--sp-5); display: grid; gap: var(--sp-3); }

/* â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ FOOTER â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
.footer {
  background: var(--ink-800);
  color: rgba(255,255,255,0.6);
  padding: var(--sp-16) 0 var(--sp-10);
  margin-top: var(--sp-16);
}
.footer-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: var(--sp-8);
  margin-bottom: var(--sp-10);
}
@media (min-width: 700px) { .footer-grid { grid-template-columns: 2fr 1fr 1fr 1fr; } }
.footer h5 {
  font-family: var(--font-sans);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--gold-300);
  opacity: var(--gold-opacity);
  margin-bottom: var(--sp-4);
}
.footer ul { list-style: none; padding: 0; margin: 0; display: grid; gap: var(--sp-2); }
.footer a:hover { color: #fff; }
.footer .brandwm {
  font-family: var(--display-family);
  font-size: 28px; line-height: 1;
  color: #fff;
  margin-bottom: var(--sp-3);
}
.footer .brand-tag { color: rgba(255,255,255,0.6); max-width: 320px; font-size: 14px; }
.footer-bottom {
  border-top: 1px solid rgba(255,255,255,0.08);
  padding-top: var(--sp-5);
  display: flex; flex-wrap: wrap; gap: var(--sp-3);
  justify-content: space-between;
  font-size: 12px;
  color: rgba(255,255,255,0.5);
}

/* â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ MODE / BANNER â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
.banner {
  background: var(--ink-800);
  color: #fff;
  padding: var(--sp-12) 0 var(--sp-10);
  text-align: center;
}
.banner h1 {
  font-family: var(--display-family);
  font-weight: 500;
  font-size: clamp(36px, 5vw, 56px);
  line-height: 1.05;
  letter-spacing: -0.015em;
  margin: var(--sp-3) 0 var(--sp-3);
  color: #fff;
}
.banner h1 em { color: var(--gold-200); font-style: italic; opacity: var(--gold-opacity); }
.banner p { color: rgba(255,255,255,0.7); max-width: 580px; margin: 0 auto; }
.banner .eyebrow { color: var(--gold-300); }

/* back row */
.back-row {
  padding-top: var(--sp-4);
  padding-bottom: var(--sp-2);
}
.back-btn {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 13px; font-weight: 500;
  color: var(--fg-muted);
  padding: 8px 0;
}
.back-btn:hover { color: var(--brand-live); }

/* mode cards */
.mode-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: var(--sp-5);
  max-width: 880px;
  margin: 0 auto;
  padding: var(--sp-12) 0;
}
@media (min-width: 700px) { .mode-grid { grid-template-columns: 1fr 1fr; } }
.mode-card {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: var(--sp-8);
  text-align: left;
  transition: transform var(--dur-base) var(--ease-out), box-shadow var(--dur-base), border-color var(--dur-base);
  display: flex; flex-direction: column; gap: var(--sp-5);
  cursor: pointer;
}
.mode-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); border-color: var(--gold-300); }
.mode-card .mode-illu {
  aspect-ratio: 4/3;
  border-radius: var(--r-md);
  background: var(--cream-100);
  position: relative;
  overflow: hidden;
  display: grid; place-items: center;
}
.mode-card .mode-illu img { width: 50%; height: 50%; object-fit: contain; opacity: 0.9; }
.mode-card h3 {
  font-family: var(--display-family);
  font-weight: 500; font-size: 32px; line-height: 1.05;
  color: var(--ink-800);
}
.mode-card p { color: var(--fg-muted); font-size: 14px; line-height: 1.6; }
.mode-card .meta-row {
  display: flex; gap: var(--sp-2); flex-wrap: wrap;
  font-size: 12px;
  color: var(--ink-500);
}
.mode-card .meta-row span {
  padding: 4px 10px;
  background: var(--cream-100);
  border-radius: var(--r-pill);
}

/* â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ OUTLET LIST â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
.outlet-search {
  position: sticky; top: var(--nav-h); z-index: 40;
  background: var(--cream-100);
  border-bottom: 1px solid var(--border);
  padding: var(--sp-4) 0;
}
.search-input {
  position: relative;
}
.search-input svg {
  position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
  color: var(--fg-muted); pointer-events: none;
}
.search-input .input { padding-left: 48px; height: 52px; }

.outlet-areas {
  display: grid; gap: var(--sp-2); margin-top: var(--sp-3);
  grid-template-columns: 1fr; max-width: 520px;
}
.area-pill {
  padding: 6px 14px;
  background: transparent;
  border: 1px solid var(--ink-200);
  border-radius: var(--r-pill);
  font-size: 12px; font-weight: 500;
  color: var(--ink-600);
  transition: all var(--dur-fast);
  white-space: nowrap;
}
.area-pill.active { background: var(--ink-800); color: #fff; border-color: var(--ink-800); }
.area-row {
  display: flex; gap: var(--sp-2); flex-wrap: wrap;
  margin-top: var(--sp-3);
}

.outlet-list {
  padding: var(--sp-6) 0 var(--sp-12);
}
.outlet-area-head {
  margin: var(--sp-8) 0 var(--sp-3);
  display: flex; align-items: baseline; gap: var(--sp-3);
}
.outlet-area-head:first-child { margin-top: 0; }
.outlet-area-head h3 {
  font-family: var(--display-family);
  font-weight: 500; font-size: 24px; color: var(--ink-800);
}
.outlet-area-head .count { font-size: 12px; color: var(--fg-muted); letter-spacing: 0.06em; }

.outlet-row {
  display: grid;
  grid-template-columns: 32px 1fr auto;
  gap: var(--sp-4);
  align-items: center;
  padding: var(--sp-5) 0;
  border-top: 1px solid var(--border);
  text-align: left;
  width: 100%;
  cursor: pointer;
  transition: background var(--dur-fast);
}
.outlet-row:hover { background: var(--cream-50); }
.outlet-row .pin { color: var(--ink-300); display: grid; place-items: center; }
.outlet-row.nearest .pin { color: var(--brand-live); }
.outlet-row .info h4 {
  font-size: 16px; font-weight: 600; color: var(--ink-800);
  margin-bottom: 2px;
}
.outlet-row .info .meta {
  font-size: 13px; color: var(--fg-muted);
  display: flex; gap: 6px; flex-wrap: wrap;
}
.outlet-row .info .meta span:not(:last-child)::after { content: " · "; color: var(--ink-300); }
.outlet-row .info .tags { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
.outlet-row .arrow {
  color: var(--ink-300);
  transition: transform var(--dur-fast), color var(--dur-fast);
}
.outlet-row:hover .arrow { color: var(--brand-live); transform: translateX(2px); }

/* â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ DELIVERY ADDRESS â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
.delivery-search-bar {
  position: sticky; top: var(--nav-h); z-index: 40;
  padding: var(--sp-5) 0 var(--sp-4);
  background: var(--ink-800);
  color: #fff;
}
.delivery-search-bar .back-btn { color: rgba(255,255,255,0.7); }
.delivery-search-bar .back-btn:hover { color: #fff; }
.delivery-input-wrap {
  position: relative;
  display: flex; align-items: center;
  background: #fff; border-radius: var(--r-md);
  padding: 0 var(--sp-3) 0 var(--sp-4);
  height: 56px;
}
.delivery-input-wrap svg { color: var(--ink-400); flex-shrink: 0; }
.delivery-input-wrap input {
  flex: 1; border: 0; background: transparent; outline: none;
  padding: 0 var(--sp-3); height: 100%; font-size: 15px;
  color: var(--ink-800);
}
.delivery-input-wrap input::placeholder { color: var(--ink-400); }
.delivery-input-wrap .clr {
  width: 32px; height: 32px; border-radius: var(--r-pill);
  display: grid; place-items: center;
  color: var(--ink-400);
}
.delivery-input-wrap .clr:hover { color: var(--ink-700); background: var(--cream-100); }

.suggestion-list {
  background: #fff;
  border-radius: var(--r-md);
  padding: var(--sp-2) 0;
  margin-top: var(--sp-2);
  box-shadow: var(--shadow-md);
  max-height: 280px; overflow-y: auto;
}
.suggestion-item {
  display: grid;
  grid-template-columns: 28px 1fr;
  gap: var(--sp-3);
  align-items: center;
  width: 100%;
  text-align: left;
  padding: var(--sp-3) var(--sp-4);
  font-size: 14px; color: var(--ink-800);
}
.suggestion-item:hover { background: var(--cream-50); }
.suggestion-item svg { color: var(--ink-400); }

/* saved address chips */
.saved-row { display: grid; gap: var(--sp-2); margin-top: var(--sp-4); }
.saved-chip {
  display: grid;
  grid-template-columns: 36px 1fr auto;
  gap: var(--sp-3);
  align-items: center;
  padding: var(--sp-3) var(--sp-4);
  background: #fff;
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  text-align: left;
  width: 100%;
}
.saved-chip:hover { border-color: var(--brand-live); }
.saved-chip .lbl-circ {
  width: 36px; height: 36px;
  border-radius: var(--r-pill);
  background: var(--cream-100);
  color: var(--brand-live);
  display: grid; place-items: center;
}
.saved-chip h5 { font-size: 14px; font-weight: 600; color: var(--ink-800); }
.saved-chip p { font-size: 12px; color: var(--fg-muted); margin-top: 2px; }

/* delivery confirm panel */
.delivery-confirm-panel {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: var(--sp-6);
  margin-top: var(--sp-6);
}
.matched-outlet {
  margin: var(--sp-4) 0;
  padding: var(--sp-4);
  border-radius: var(--r-md);
  background: var(--success-50);
  border: 1px solid rgba(79,140,107,0.2);
  display: grid;
  grid-template-columns: 36px 1fr;
  gap: var(--sp-3);
  align-items: start;
}
.matched-outlet svg { color: var(--success-500); margin-top: 2px; }
.matched-outlet h5 { font-size: 14px; font-weight: 600; color: var(--success-700); }
.matched-outlet p { font-size: 13px; color: var(--ink-600); margin-top: 2px; }
.matched-outlet .switch { color: var(--brand-live); font-size: 12px; font-weight: 600; margin-top: 6px; display: inline-block; }

/* â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ MENU â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
.menu-context {
  position: sticky; top: var(--nav-h); z-index: 38;
  background: rgba(255, 251, 247, 0.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: var(--sp-3) 0;
}
.menu-context-row { display: flex; gap: var(--sp-2); flex-wrap: wrap; align-items: center; }
.context-pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 12px;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: var(--r-pill);
  font-size: 12px; font-weight: 500;
  color: var(--ink-700);
}
.context-pill svg { color: var(--brand-live); }
.context-pill.changeable { cursor: pointer; }
.context-pill.changeable:hover { border-color: var(--brand-live); color: var(--brand-live); }

.menu-tabs {
  position: sticky; top: calc(var(--nav-h) + 50px); z-index: 37;
  background: var(--cream-50);
  border-bottom: 1px solid var(--border);
  padding: var(--sp-3) 0;
}
.menu-tabs-inner {
  display: flex; gap: var(--sp-2);
  overflow-x: auto;
  scrollbar-width: none;
  padding-bottom: 4px;
}
.menu-tabs-inner::-webkit-scrollbar { display: none; }
.tab-btn {
  flex-shrink: 0;
  padding: 8px 16px;
  border: 1px solid var(--ink-200);
  border-radius: var(--r-pill);
  background: #fff;
  font-size: 13px; font-weight: 500;
  color: var(--ink-600);
  white-space: nowrap;
  transition: all var(--dur-fast);
}
.tab-btn:hover { border-color: var(--ink-700); color: var(--ink-800); }
.tab-btn.active { background: var(--ink-800); color: #fff; border-color: var(--ink-800); }

.cat-section { padding-top: var(--sp-10); scroll-margin-top: 200px; }
.cat-head {
  display: flex; align-items: baseline; justify-content: space-between; gap: var(--sp-4);
  margin-bottom: var(--sp-6);
}
.cat-head h2 {
  font-family: var(--display-family);
  font-weight: 500; font-size: clamp(28px, 3.5vw, 40px);
  letter-spacing: -0.015em;
  color: var(--ink-800);
}
.cat-head .gold-marker {
  height: 1px;
  flex: 1;
  background: var(--gold-300);
  opacity: var(--gold-opacity);
}
.cat-head .cnt { color: var(--fg-muted); font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase; }

.product-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: var(--sp-5);
}
@media (min-width: 600px) { .product-grid { grid-template-columns: repeat(2, 1fr); } }
@media (min-width: 900px) { .product-grid { grid-template-columns: repeat(3, 1fr); } }
@media (min-width: 1200px) { .product-grid { grid-template-columns: repeat(4, 1fr); } }

.product-card {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  overflow: hidden;
  display: flex; flex-direction: column;
  transition: transform var(--dur-base) var(--ease-out), box-shadow var(--dur-base);
  cursor: pointer;
}
.product-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
.product-art {
  position: relative;
  aspect-ratio: 1;
  background: #F7F4F0;
  overflow: hidden;
  display: grid; place-items: center;
}
.product-art img {
  width: 100%; height: 100%; object-fit: cover;
  transition: transform var(--dur-slow) var(--ease-out);
}
.product-card:hover .product-art img { transform: scale(1.04); }
.product-tag {
  position: absolute; top: 12px; left: 12px;
}
.product-body {
  padding: var(--sp-4) var(--sp-5) var(--sp-5);
  display: flex; flex-direction: column; gap: var(--sp-2);
  flex: 1;
}
.product-body h3 {
  font-family: var(--display-family);
  font-weight: 500;
  font-size: 20px;
  line-height: 1.15;
  letter-spacing: -0.005em;
  color: var(--ink-800);
}
.product-body .meta { font-size: 12px; color: var(--fg-muted); line-height: 1.4; }
.product-body .price-row {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: auto;
  padding-top: var(--sp-3);
}
.product-body .price {
  font-family: var(--font-sans);
  font-weight: 600; font-size: 16px;
  color: var(--ink-800);
  font-variant-numeric: tabular-nums;
}
.add-btn {
  width: 36px; height: 36px;
  border-radius: var(--r-pill);
  background: var(--brand-live);
  color: #fff;
  display: grid; place-items: center;
  transition: background var(--dur-fast), transform var(--dur-fast);
}
.add-btn:hover { background: var(--red-700); transform: scale(1.06); }

.qty-stepper {
  display: inline-flex;
  align-items: center;
  background: var(--cream-100);
  border-radius: var(--r-pill);
  padding: 4px;
}
.qty-stepper button {
  width: 32px; height: 32px;
  display: grid; place-items: center;
  color: var(--brand-live);
  border-radius: var(--r-pill);
}
.qty-stepper button:hover { background: rgba(255,255,255,0.7); }
.qty-stepper .qty-num {
  min-width: 24px; text-align: center;
  font-weight: 600; font-size: 14px;
  font-variant-numeric: tabular-nums;
}

/* â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ VIEW CART FLOATING â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
.view-cart {
  position: fixed;
  left: 50%; transform: translateX(-50%);
  bottom: calc(20px + env(safe-area-inset-bottom));
  z-index: var(--z-sticky);
  width: calc(100% - 32px);
  max-width: 540px;
  display: flex; align-items: center; justify-content: space-between;
  gap: var(--sp-4);
  padding: 14px var(--sp-4) 14px var(--sp-5);
  background: var(--ink-800);
  color: #fff;
  border-radius: var(--r-pill);
  box-shadow: 0 16px 40px rgba(25,25,25,0.3);
  text-align: left;
  border: 1px solid var(--gold-400);
  animation: viewCartIn .32s var(--ease-emphasis) both;
}
@keyframes viewCartIn { from { transform: translateX(-50%) translateY(20px); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }
.view-cart .vc-meta {
  display: flex; flex-direction: column; gap: 2px; min-width: 0;
}
.view-cart .vc-label { font-size: 11px; color: var(--gold-200); opacity: var(--gold-opacity); letter-spacing: 0.18em; text-transform: uppercase; }
.view-cart .vc-text { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.view-cart .vc-cta {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 10px 16px;
  border-radius: var(--r-pill);
  background: #fff;
  color: var(--ink-800);
  font-size: 13px; font-weight: 600;
  flex-shrink: 0;
}

/* â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ PRODUCT MODAL â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
.modal-backdrop {
  position: fixed; inset: 0; z-index: var(--z-modal);
  background: rgba(25,25,25,0.4);
  backdrop-filter: blur(8px);
  display: flex; align-items: flex-end; justify-content: center;
  animation: fadebd .26s ease both;
  overflow: hidden;
}
@media (min-width: 700px) { .modal-backdrop { align-items: center; padding: var(--sp-5); } }
@keyframes fadebd { from { opacity: 0; } to { opacity: 1; } }

.product-modal {
  width: 100%; max-width: 720px;
  background: #fff;
  border-top-left-radius: var(--r-xl);
  border-top-right-radius: var(--r-xl);
  max-height: 92vh;
  display: flex; flex-direction: column;
  animation: slideup .32s var(--ease-emphasis) both;
}
@media (min-width: 700px) { .product-modal { border-radius: var(--r-xl); max-height: 88vh; } }
@keyframes slideup { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

.modal-art {
  background: var(--cream-50);
  padding: var(--sp-8) var(--sp-8) var(--sp-3);
  position: relative;
  display: grid; place-items: center;
  aspect-ratio: 16/9;
}
.modal-art img { width: 100%; height: 100%; object-fit: contain; max-width: 320px; }
.modal-close {
  position: absolute; top: 16px; right: 16px;
  width: 36px; height: 36px;
  border-radius: var(--r-pill);
  background: rgba(255,255,255,0.9);
  display: grid; place-items: center;
  color: var(--ink-700);
}
.modal-close:hover { background: #fff; color: var(--ink-900); }

.modal-body {
  padding: var(--sp-6) var(--sp-8) 0;
  flex: 1;
  overflow-y: auto;
}
.modal-title-row { display: flex; align-items: flex-start; justify-content: space-between; gap: var(--sp-4); }
.modal-body h2 {
  font-family: var(--display-family);
  font-weight: 500; font-size: clamp(28px, 3.5vw, 36px);
  letter-spacing: -0.015em;
  color: var(--ink-800);
  line-height: 1.1;
}
.modal-body .price { font-family: var(--font-sans); font-weight: 600; font-size: 20px; }
.modal-body .desc {
  margin-top: var(--sp-3);
  color: var(--fg-muted);
  font-size: 14px; line-height: 1.6;
}
.modal-section { margin-top: var(--sp-6); }
.modal-section h3 {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-500);
  margin-bottom: var(--sp-3);
}
.option-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: var(--sp-2);
}
.option-card {
  padding: var(--sp-3) var(--sp-4);
  background: #fff;
  border: 1px solid var(--ink-200);
  border-radius: var(--r-md);
  display: flex; align-items: center; justify-content: space-between;
  font-size: 14px;
  text-align: left;
  transition: border-color var(--dur-fast), background var(--dur-fast);
}
.option-card:hover { border-color: var(--ink-700); }
.option-card.selected { border-color: var(--brand-live); background: rgba(158,11,15,0.04); color: var(--brand-live); }
.option-card .opt-extra { color: var(--fg-muted); font-size: 12px; }
.option-card.selected .opt-extra { color: var(--brand-live); }

.modal-foot {
  position: sticky; bottom: 0;
  background: #fff;
  border-top: 1px solid var(--border);
  padding: var(--sp-4) var(--sp-8);
  display: flex; align-items: center; gap: var(--sp-4);
}
.modal-foot .qty-modal {
  display: flex; align-items: center; gap: 8px;
  padding: 6px;
  background: var(--cream-50);
  border-radius: var(--r-pill);
}
.modal-foot .qty-modal button {
  width: 36px; height: 36px;
  border-radius: var(--r-pill);
  background: #fff;
  color: var(--brand-live);
  display: grid; place-items: center;
  border: 1px solid var(--border);
}
.modal-foot .qty-modal button:hover { border-color: var(--brand-live); }
.modal-foot .qty-modal strong { min-width: 24px; text-align: center; font-variant-numeric: tabular-nums; }

/* â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ CHECKOUT â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
.checkout-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: var(--sp-6);
  align-items: start;
  padding: var(--sp-8) 0 var(--sp-12);
}
@media (min-width: 900px) { .checkout-grid { grid-template-columns: 1.2fr 0.8fr; gap: var(--sp-8); } }

.checkout-section {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: var(--sp-6);
  margin-bottom: var(--sp-5);
}
.checkout-section h3 {
  font-family: var(--display-family);
  font-weight: 500; font-size: 22px;
  margin-bottom: var(--sp-4);
  color: var(--ink-800);
}

.cart-item-row {
  display: grid;
  grid-template-columns: 64px 1fr auto;
  gap: var(--sp-3);
  align-items: center;
  padding: var(--sp-3) 0;
  border-top: 1px solid var(--border);
}
.cart-item-row:first-child { border-top: 0; padding-top: 0; }
.cart-item-row .ci-art {
  width: 64px; height: 64px;
  background: var(--cream-50);
  border-radius: var(--r-md);
  padding: 8px;
  display: grid; place-items: center;
}
.cart-item-row .ci-art img { width: 100%; height: 100%; object-fit: contain; }
.cart-item-row h4 { font-size: 15px; font-weight: 600; color: var(--ink-800); }
.cart-item-row .ci-meta { font-size: 12px; color: var(--fg-muted); margin-top: 2px; }
.cart-item-row .ci-actions { display: flex; align-items: center; gap: var(--sp-2); }
.cart-item-row .ci-price { font-weight: 600; font-variant-numeric: tabular-nums; }
.cart-item-row .ci-remove { color: var(--ink-400); font-size: 12px; }
.cart-item-row .ci-remove:hover { color: var(--brand-live); }

.totals { padding-top: var(--sp-3); border-top: 1px solid var(--border); margin-top: var(--sp-2); }
.totals-row { display: flex; justify-content: space-between; gap: var(--sp-4); padding: 6px 0; color: var(--fg-muted); font-size: 14px; }
.totals-row.grand {
  margin-top: var(--sp-3); padding-top: var(--sp-3);
  border-top: 1px solid var(--border);
  color: var(--ink-800);
  font-family: var(--display-family);
  font-weight: 500;
  font-size: 28px;
}
.totals-row.discount { color: var(--success-700); }

/* radio choices */
.radio-grid { display: grid; grid-template-columns: 1fr; gap: var(--sp-2); }
.radio-row {
  padding: var(--sp-4);
  background: #fff;
  border: 1px solid var(--ink-200);
  border-radius: var(--r-md);
  display: grid;
  grid-template-columns: 24px 1fr auto;
  gap: var(--sp-3);
  align-items: center;
  cursor: pointer;
  transition: border-color var(--dur-fast), background var(--dur-fast);
}
.radio-row:hover { border-color: var(--ink-700); }
.radio-row.selected { border-color: var(--brand-live); background: rgba(158,11,15,0.03); }
.radio-row .ring {
  width: 20px; height: 20px;
  border-radius: var(--r-pill);
  border: 2px solid var(--ink-300);
  display: grid; place-items: center;
}
.radio-row.selected .ring { border-color: var(--brand-live); }
.radio-row.selected .ring::after {
  content: ""; width: 10px; height: 10px;
  background: var(--brand-live); border-radius: var(--r-pill);
}
.radio-row h5 { font-size: 14px; font-weight: 600; color: var(--ink-800); }
.radio-row p { font-size: 12px; color: var(--fg-muted); margin-top: 2px; }

/* â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ CONFIRMATION â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
.confirm-wrap {
  max-width: 720px;
  margin: 0 auto;
  padding: var(--sp-12) 0 var(--sp-16);
  text-align: center;
}
.checkmark-wrap {
  width: 88px; height: 88px;
  margin: 0 auto var(--sp-5);
  border-radius: var(--r-pill);
  background: var(--success-50);
  display: grid; place-items: center;
}
.checkmark-wrap svg circle { stroke: var(--success-500); stroke-width: 3; fill: none; stroke-dasharray: 200; stroke-dashoffset: 200; animation: stroke 600ms ease forwards; }
.checkmark-wrap svg path { stroke: var(--success-500); stroke-width: 4; fill: none; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 60; stroke-dashoffset: 60; animation: stroke 400ms 500ms ease forwards; }
@keyframes stroke { to { stroke-dashoffset: 0; } }
.confirm-wrap h1 {
  font-family: var(--display-family); font-weight: 500;
  font-size: clamp(36px, 5vw, 56px);
  letter-spacing: -0.015em;
  color: var(--ink-800);
  margin-bottom: var(--sp-3);
}
.confirm-wrap .ref { color: var(--fg-muted); font-size: 14px; letter-spacing: 0.06em; }

.confirm-summary {
  margin-top: var(--sp-8);
  padding: var(--sp-6);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  text-align: left;

/* â”€â”€ ProductImg ”” renders image with category-coloured SVG fallback â”€â”€ */
const CAT_PALETTE = {
  hot:        ['#F7F4F0', '#7A5C3A'],
  cold:       ['#F7F4F0', '#3A5C7A'],
  frappes:    ['#F7F4F0', '#5C3A7A'],
  breakfast:  ['#F7F4F0', '#7A5C3A'],
  sandwiches: ['#F7F4F0', '#3A7A5C'],
  burgers:    ['#F7F4F0', '#7A4A3A'],
  meals:      ['#F7F4F0', '#5C4A2A'],
  signature:  ['#F7F4F0', '#7A5C2A'],
};
const ProductImg = ({ src, alt, name, category, style, ...rest }) => {
  const [err, setErr] = useState(false);
  const [bg, fg] = CAT_PALETTE[category] || ['#F2E4D3', '#5C5C5C'];
  const initials = (name || alt || '?')
    .split(' ').slice(0, 2).map(w => w[0]).join('').toUpperCase();
  if (err) {
    return (
      <svg viewBox="0 0 100 100" style={{ width: '100%', height: '100%', display: 'block', ...style }}
           xmlns="http://www.w3.org/2000/svg" aria-label={alt}>
        <rect width="100" height="100" fill={bg}/>
        <text x="50" y="60" textAnchor="middle" fontSize="38" fontWeight="600"
              fill={fg} fontFamily="Georgia,serif">{initials}</text>
      </svg>
    );
  }
  return <img src={src} alt={alt} style={style} {...rest} onError={() => setErr(true)} />;
};
window.ProductImg = ProductImg;

const LoyaltyModal = ({ open, onClose, onSubmit, prefill }) => {
  const [name, setName] = useState(prefill?.name || "");
  const [phone, setPhone] = useState(prefill?.phone || "");
  const [email, setEmail] = useState("");
  const [errs, setErrs] = useState({});

  useEffect(() => { if (open) setErrs({}); }, [open]);

  const submit = (e) => {
    e.preventDefault();
    const err = {};
    if (!name.trim() || name.trim().length < 2) err.name = "Please enter your full name.";
    const cleanPhone = phone.replace(/\D/g, "");
    if (cleanPhone.length !== 9) err.phone = "Enter 9 digits, without the leading zero.";
    if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) err.email = "That email looks off.";
    setErrs(err);
    if (Object.keys(err).length === 0) onSubmit({ name: name.trim(), phone: cleanPhone, email: email.trim() });
  };

  if (!open) return null;

  return (
    <div className="modal-backdrop" onClick={onClose} data-comment-anchor="loyalty-modal">
      <article
        className="product-modal"
        style={{ maxWidth: 540, borderRadius: "var(--r-xl)" }}
        onClick={(e) => e.stopPropagation()}
        role="dialog"
        aria-modal="true"
      >
        <div style={{
          padding: "var(--sp-8) var(--sp-8) var(--sp-3)",
          borderBottom: "1px solid var(--border)",
          display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: "var(--sp-4)"
        }}>
          <div>
            <div className="eyebrow">The Patisserie Tribe</div>
            <h2 className="serif" style={{
              fontFamily: "var(--display-family)", fontWeight: 500,
              fontSize: "clamp(26px, 4vw, 36px)", lineHeight: 1.1, marginTop: 8, color: "var(--ink-800)"
            }}>
              Join in <em style={{ fontStyle: "italic", color: "var(--brand-live)" }}>30 seconds</em>.
            </h2>
            <p className="muted" style={{ marginTop: 8, fontSize: 14 }}>
              We just need your name and phone ”” start earning from your next order.
            </p>
          </div>
          <button className="modal-close" onClick={onClose} style={{ position: "static" }} aria-label="Close">
            <Icon name="close" size={18} />
          </button>
        </div>

        <form className="modal-body" onSubmit={submit} style={{ paddingBottom: "var(--sp-6)" }} noValidate>
          <div className="field">
            <label className="lbl" htmlFor="loy-name">Full name</label>
            <input
              id="loy-name"
              className={"input " + (errs.name ? "invalid" : "")}
              placeholder="e.g. Akello Nantongo"
              value={name}
              onChange={(e) => setName(e.target.value)}
              autoComplete="name"
              required
            />
            {errs.name && <div className="hint" style={{ color: "var(--error-500)" }}>{errs.name}</div>}
          </div>

          <div className="field">
            <label className="lbl" htmlFor="loy-phone">Phone number</label>
            <div className={"phone-wrap " + (errs.phone ? "invalid" : "")} style={errs.phone ? { borderColor: "var(--error-500)", background: "#FFF5F5" } : null}>
              <span className="phone-prefix">ðŸ‡ºðŸ‡¬ +256</span>
              <input
                id="loy-phone"
                className="input"
                inputMode="numeric"
                maxLength={9}
                placeholder="703 631 215"
                value={phone}
                onChange={(e) => setPhone(e.target.value.replace(/\D/g, "").slice(0, 9))}
                autoComplete="tel"
                required
              />
            </div>
            <div className="hint" style={errs.phone ? { color: "var(--error-500)" } : null}>
              {errs.phone || "Enter 9 digits, without the leading zero."}
            </div>
          </div>

          <div className="field">
            <label className="lbl" htmlFor="loy-email">Email <span className="muted" style={{ textTransform: "none", letterSpacing: 0, fontWeight: 500 }}>(optional)</span></label>
            <input

            />
            {errs.email && <div className="hint" style={{ color: "var(--error-500)" }}>{errs.email}</div>}
          </div>

          <button className="btn full lg" type="submit" style={{ marginTop: 8 }}>Create my account</button>

          </p>
        </form>
      </article>
    </div>
  );

/* â”€â”€â”€ Loyalty Dashboard â”€â”€â”€ */
const LoyaltyDashboard = ({ account, onBack, onOrder }) => {
  const tiers = window.LP_DATA.LOYALTY_TIERS;
  const lifetime = account.lifetimePoints;
  // current tier ”” last tier whose min â‰¤ lifetime
  let curIdx = 0;
  for (let i = 0; i < tiers.length; i++) if (lifetime >= tiers[i].min) curIdx = i;
  const cur = tiers[curIdx];
  const next = tiers[curIdx + 1];
  const segMin = cur.min;
  const segMax = next ? next.min : Math.max(lifetime, cur.min) * 1.2;
  const pct = next ? Math.min(100, Math.max(0, ((lifetime - segMin) / (segMax - segMin)) * 100)) : 100;

  const fmt = window.LP_DATA.formatUGX;

  return (
    <div className="page" data-screen-label="03 Loyalty Dashboard">
      <div className="container back-row">
        <button className="back-btn" onClick={onBack}><Icon name="arrow-left" size={16}/> Home</button>

      <div className="container" style={{ paddingTop: "var(--sp-4)", paddingBottom: "var(--sp-12)" }}>
        <div className="dash-hero">
          <div className="eyebrow">Welcome back, {account.name.split(" ")[0]}</div>
          <h1 className="tabular">{Number(account.points).toLocaleString()}</h1>
          <div className="pts-label">points available · {fmt(Math.floor(account.points))} value</div>

          <div className="progress">
            <div className="progress-bar">
              <div className="progress-fill" style={{ width: pct + "%" }}/>
            </div>
            <div className="prog-row">
              <span><strong>{cur.name}</strong> · {cur.perk}</span>
              {next
                ? <span>{(next.min - lifetime).toLocaleString()} pts to <strong>{next.name}</strong></span>
                : <span>Top tier achieved</span>}
            </div>
          </div>

          <div className="dash-tier-row">
            {tiers.map((t, i) => (
              <div key={t.id} className={"tier-cell " + (i === curIdx ? "cur" : "")}>
                <strong>{t.name}</strong>
                <span>{t.min === 0 ? "Start" : `${t.min.toLocaleString()}+`} · {Math.round(t.mult * 100)}% back</span>
              </div>
            ))}
          </div>

          <div style={{ display: "flex", gap: "var(--sp-3)", marginTop: "var(--sp-6)", flexWrap: "wrap" }}>
            <button className="btn gold" onClick={onOrder}>Redeem at checkout</button>
            <button className="btn secondary" onClick={onOrder} style={{ color: "#fff", borderColor: "rgba(255,255,255,0.4)" }}>Place an order</button>
          </div>
        </div>

        <div className="dash-section">
          <h3 className="serif">Your stats</h3>
          <div className="dash-grid">
            <div className="dash-card">
              <h4>Points balance</h4>
              <div className="big tabular">{account.points.toLocaleString()}</div>
              <div className="sm">â‰ˆ {fmt(Math.floor(account.points))} value</div>
            </div>
            <div className="dash-card">
              <h4>Lifetime points</h4>
              <div className="big tabular">{account.lifetimePoints.toLocaleString()}</div>
              <div className="sm">Since joining {account.joined}</div>
            </div>
            <div className="dash-card">
              <h4>Total redeemed</h4>
              <div className="big tabular">{fmt(account.redeemed)}</div>
              <div className="sm">Lifetime savings</div>
            </div>
          </div>
        </div>

        <div className="dash-section">
          <div className="row between" style={{ marginBottom: "var(--sp-5)" }}>
            <h3 className="serif" style={{ margin: 0 }}>Recent activity</h3>
            <button className="btn ghost" type="button">See all â†’</button>
          </div>
          <div className="history-list">
            {account.history.map(h => (
              <div key={h.id} className={"history-row " + h.kind}>
                <div>
                  <h5>{h.kind === "redeem" ? "Redeemed UGX 5,000" : "Order at " + h.outlet}</h5>

        <div className="dash-section">
          <h3 className="serif">Perks at your tier</h3>
          <div className="dash-grid">
            <div className="dash-card">
              <div className="badge gold" style={{ marginBottom: 12 }}>Active</div>
              <h5 style={{ fontFamily: "var(--display-family)", fontWeight: 500, fontSize: 22, color: "var(--ink-800)" }}>5% back forever</h5>

  const areas = useMemo(() => ["All", ...Array.from(new Set(outlets.map(o => o.area)))], [outlets]);

  const filtered = useMemo(() => {
    return outlets
      .filter(o => area === "All" || o.area === area)
      .filter(o => !q || (o.name + " " + o.area).toLowerCase().includes(q.toLowerCase()))
      .sort((a, b) => a.distance - b.distance);

    const out = {};

const DeliveryAddress = ({ outlets, onBack, onConfirm }) => {
  const [q, setQ] = useState("");
  const [selectedOutlet, setSelectedOutlet] = useState(null);
  const [details, setDetails] = useState({ apt: "", instructions: "" });

  const zone = inferZone(q);
  const nearestIds = zone ? (ZONE_OUTLETS[zone] || []) : [];
  const nearestSet = new Set(nearestIds);

  const sortedOutlets = useMemo(() => {
    return outlets
      .map(o => ({ ...o, isNearest: nearestSet.has(o.id) }))
      .sort((a, b) => {
        if (a.isNearest !== b.isNearest) return Number(b.isNearest) - Number(a.isNearest);
        if (a.isNearest && b.isNearest) return nearestIds.indexOf(a.id) - nearestIds.indexOf(b.id);
        return a.distance - b.distance;
      });
  }, [outlets, zone]);

  const estMins = (km) => Math.round(10 + km * 1.8);

                <Icon name="close" size={16}/>

        </div>

      {/* Stage 1 ”” outlet list */}

            <p style={{ padding: "20px 20px 8px", fontSize: 13, color: "var(--fg-muted)", textAlign: "center" }}>

          {sortedOutlets.map(o => (
            <button
              key={o.id}
              className={`outlet-row${o.isNearest ? " nearest" : ""}`}
              type="button"
              onClick={() => setSelectedOutlet(o)}
              style={{ width: "100%", textAlign: "left", background: "none", border: "none", borderBottom: "1px solid var(--border)" }}
            >
              <span className="pin">

                  <path d="M12 0C7.58 0 4 3.58 4 8c0 5.25 8 16 8 16s8-10.75 8-16c0-4.42-3.58-8-8-8zm0 11a3 3 0 1 1 0-6 3 3 0 0 1 0 6z"/>
                </svg>
              </span>
              <span className="info">
                <span className="info" style={{ display: "block" }}>
                  <strong style={{ fontSize: 15, fontWeight: 600, color: "var(--ink-800)" }}>{o.name}</strong>
                </span>
                <span className="meta">
                  <span>~{estMins(o.distance)} min delivery</span>
                  <span>{o.distance} km</span>
                  <span>{o.hours}</span>
                </span>
                <span className="tags">
                  {o.isNearest && (
                    <span style={{
                      display: "inline-block", padding: "2px 8px", borderRadius: 999,
                      fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.05em",

const Menu = ({ context, onBack, onChangeContext, cart, onAddCart, onOpenCart }) => {
  const { CATEGORIES, PRODUCTS, formatUGX } = window.LP_DATA;
  const [activeCat, setActiveCat] = useState(CATEGORIES[0].id);
  const [openProduct, setOpenProduct] = useState(null);
  const sectionRefs = useRef({});

  // Quick-add: builds default selections (required groups â†’ first option),
  // adds to cart immediately, then opens cart view.
  const quickAdd = (p, e) => {
    e.stopPropagation();
    const groups = p.drink ? MODIFIER_GROUPS.drink : MODIFIER_GROUPS.food;
    let extra = 0;
    const labels = [];
    groups.forEach(g => {
      if (g.required) {
        const opt = g.options[0];
        extra += opt.extra;
        labels.push(opt.label);
      }
    });
    onAddCart({
      productId: p.id,
      name: p.name,
      img: p.img,
      meta: p.meta,
      qty: 1,
      unitPrice: p.price + extra,
      modifiers: labels.join(" · "),
    });
    onOpenCart();
  };

  // intersection observer to auto-highlight tab on scroll
  useEffect(() => {
    const obs = new IntersectionObserver((entries) => {
      const visible = entries.filter(e => e.isIntersecting).sort((a, b) => b.intersectionRatio - a.intersectionRatio)[0];
      if (visible) setActiveCat(visible.target.dataset.cat);
    }, { rootMargin: "-30% 0px -55% 0px", threshold: [0, 0.2, 0.5, 1] });
    Object.values(sectionRefs.current).forEach(el => el && obs.observe(el));
    return () => obs.disconnect();

        </div>
      </div>

      <div className="container" style={{ paddingBottom: 140 }}>
        {CATEGORIES.map(cat => {
          const items = PRODUCTS.filter(p => p.category === cat.id);
          if (items.length === 0) return null;
          return (
            <section key={cat.id} className="cat-section"

                      <div className="product-art">

const ProductModal = ({ product, onClose, onAdd }) => {
  const fmt = window.LP_DATA.formatUGX;
  const groups = product.drink ? MODIFIER_GROUPS.drink : MODIFIER_GROUPS.food;

  // Initial selection: first option of each required group
  const initSel = {};
  groups.forEach(g => { if (g.required) initSel[g.id] = g.options[0].id; });
  const [sel, setSel] = useState(initSel);
  const [qty, setQty] = useState(1);

  const extras = useMemo(() => {
    let total = 0;
    groups.forEach(g => {
      const optId = sel[g.id];
      if (optId) {
        const opt = g.options.find(o => o.id === optId);
        if (opt) total += opt.extra;
      }
    });
    return total;
  }, [sel, groups]);

  const unitPrice = product.price + extras;
  const totalPrice = unitPrice * qty;

  const submit = (goCart) => {
    onAdd({
      productId: product.id,
      name: product.name,
      img: product.img,
      meta: product.meta,
      qty,
      unitPrice,
      modifiers: Object.entries(sel).map(([gid, oid]) => {
        const g = groups.find(x => x.id === gid);
        return g.options.find(o => o.id === oid)?.label;
      }).filter(Boolean).join(" · "),
    }, goCart);
  };

  return (
    <div className="modal-backdrop" onClick={onClose} data-comment-anchor="product-modal">
      <article className="product-modal" onClick={(e) => e.stopPropagation()} role="dialog" aria-modal="true">
        <div className="modal-art">
          <ProductImg src={product.img} alt={product.name} name={product.name} category={product.category} style={{ width: '100%', height: '100%', objectFit: 'contain', maxWidth: 320 }} />
          <button className="modal-close" onClick={onClose} aria-label="Close">
            <Icon name="close" size={18}/>
          </button>
        </div>
        <div className="modal-body">
          <div className="modal-title-row">
            <div>
              {product.tag && <div className="eyebrow" style={{ marginBottom: 4 }}>{product.tag}</div>}
              <h2 className="serif">{product.name}</h2>
              <p style={{ fontSize: 13, color: "var(--fg-muted)", marginTop: 4 }}>{product.meta}</p>
            </div>
            <div className="price">{fmt(product.price)}</div>
          </div>
          <p className="desc">{product.desc}</p>

          {groups.map(g => (
            <div key={g.id} className="modal-section">
              <h3>{g.title}{g.required && <span style={{ color: "var(--brand-live)", marginLeft: 6 }}>*</span>}</h3>
              <div className="option-grid">
                {g.options.map(o => (
                  <button
                    key={o.id}
                    className={"option-card " + (sel[g.id] === o.id ? "selected" : "")}
                    type="button"
                    onClick={() => setSel(s => ({ ...s, [g.id]: s[g.id] === o.id ? (g.required ? o.id : null) : o.id }))}
                  >
                    <span>{o.label}</span>
                    {o.extra > 0 && <span className="opt-extra">+{fmt(o.extra)}</span>}
                  </button>
                ))}
              </div>
            </div>
          ))}
        </div>
        <div className="modal-foot">
          <div className="qty-modal">
            <button onClick={() => setQty(q => Math.max(1, q - 1))} aria-label="Less"><Icon name="minus" size={14}/></button>
            <strong>{qty}</strong>
            <button onClick={() => setQty(q => q + 1)} aria-label="More"><Icon name="plus" size={14}/></button>
          </div>
          <button className="btn full" onClick={() => submit(true)}>Add to cart · {fmt(totalPrice)}</button>
        </div>
      </article>
    </div>
  );
};

const TRACK_STAGES = {
  pickup: [
    { key: "received",  title: "Order received",   desc: "We've got it. Sending it to the kitchen." },
    { key: "preparing", title: "Preparing",        desc: "Your barista is working on it now." },

    { key: "preparing",  title: "Preparing",       desc: "Hot off the grill. Just for you." },
    { key: "dispatched", title: "On the way",      desc: "A scooter is on its way. ETA 30 min." },
    { key: "delivered",  title: "Delivered",       desc: "Bon appétit." },
  ],
};

const Tracking = ({ order, context, onHome }) => {
  const stages = TRACK_STAGES[context.mode || "pickup"];
  const [idx, setIdx] = useState(0);
  useEffect(() => {
    const t = setInterval(() => setIdx(i => Math.min(i + 1, stages.length - 1)), 4500);
    return () => clearInterval(t);
  }, [stages.length]);

  return (
    <div className="page" data-screen-label="10 Tracking">
      <div className="container" style={{ paddingTop: "var(--sp-6)", paddingBottom: "var(--sp-12)" }}>
        <button className="back-btn" onClick={onHome}><Icon name="arrow-left" size={14}/> Home</button>

        <div className="tracking-card">
          <div className="tracking-head">
            <div className="ref-row">
              <div>
                <div className="eyebrow" style={{ color: "var(--gold-300)" }}>Order {order.ref}</div>
                <h2 className="serif" style={{ marginTop: 6 }}>
                  {idx === stages.length - 1 ? "All done." : (context.mode === "delivery" ? <>On its <em>way</em>.</> : <>Almost <em>ready</em>.</>)}
                </h2>
                <p className="eta">
                  {idx === stages.length - 1 ? “Order complete” : (context.mode === “delivery” ? “ETA 30-45 minutes” : “Ready in 5-10 minutes”)}
                </p>
              </div>
              <span className="badge">{stages[idx].title.toUpperCase()}</span>
            </div>
          </div>
          <div className="timeline">
            {stages.map((s, i) => (
              <div key={s.key} className={"timeline-row " + (i < idx ? "done" : i === idx ? "active" : "upcoming")}>
                <div className="timeline-dot">
                  {i < idx
                    ? <Icon name="check" size={16}/>
                    : i === idx
                      ? <Icon name={context.mode === "delivery" && s.key === "dispatched" ? "scooter" : "clock"} size={16}/>
                      : <Icon name="circle" size={10}/>}
                </div>
                <div>
                  <h4>{s.title}</h4>
                  <p>{s.desc}</p>
                </div>
              </div>
            ))}
          </div>
        </div>

        <div className="card" style={{ marginTop: 20 }}>
          <div className="row between">
            <div>
              <div className="eyebrow">Need a hand?</div>
              <h5 style={{ fontSize: 15, fontWeight: 600, marginTop: 4, color: "var(--ink-800)" }}>
                Call your outlet ”” {context.outlet?.name}
              </h5>
            </div>
            <button className="btn secondary"><Icon name="phone" size={14}/> Call</button>
          </div>
        </div>

        <button className="btn dark full lg" style={{ marginTop: 24 }} onClick={onHome}>Done</button>
      </div>
    </div>
  );
};
